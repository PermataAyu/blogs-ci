# fly.toml app configuration file generated for blogs-ci on 2026-06-02T14:30:59+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'blogs-ci'
primary_region = 'nrt'

[build]

[env]
  PORT = "3003"

[processes]
  app = "node index.js"

[http_service]
  internal_port = 3003
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
